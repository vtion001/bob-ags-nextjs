name: Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: bobacr
  RESOURCE_GROUP: rg-bob-prod
  NODE_VERSION: '22.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit
        continue-on-error: true

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push Next.js image
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image bob-nextjs:${{ github.sha }} \
            --image bob-nextjs:latest \
            --file Dockerfile .

      - name: Build & push Laravel image
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image bob-laravel:${{ github.sha }} \
            --image bob-laravel:latest \
            --file backend/Dockerfile ./backend

      - name: Deploy Next.js to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: bob-nextjs
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/bob-nextjs:${{ github.sha }}

      - name: Deploy Laravel to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: bob-laravel
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/bob-laravel:${{ github.sha }}

      - name: Run database migrations
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          az containerapp exec \
            --name bob-laravel \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --command "php artisan migrate --force"
